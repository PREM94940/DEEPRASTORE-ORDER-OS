name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build, Lint, and Typecheck
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10
        run_install: false

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install Dependencies
      run: pnpm install

    - name: Secret Scan
      run: |
        echo "Scanning for exposed production credentials..."
        ! grep -r "nctwwfpqdlyqddjdhkrk" . --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=e2e --exclude=protection.ts
        ! grep -r "Prem@9494026218" . --exclude-dir=.git --exclude-dir=node_modules

    - name: Lint
      run: pnpm -r run lint

    - name: Typecheck
      run: pnpm -r exec tsc --noEmit

    - name: Build
      run: pnpm -r run build
